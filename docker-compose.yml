name: fittracker-dev

# =============================================================
# Stack privada — fittracker-dev (mobile-only)
# App: React Native + Expo SDK 52 com SQLite local (expo-sqlite)
# Web preview em https://fittracker-dev.agathasweb.com (porta 19006)
# Celular físico conecta via Expo Go (porta 19000 / QR Code)
# =============================================================

networks:
  fittracker-dev-net:
    name: fittracker-dev-net
    driver: bridge
  agathas-proxy:
    name: agathas-proxy
    external: true

volumes:
  fittracker_node_modules:
    name: fittracker-dev-node-modules

services:
  # ── Expo (React Native) — dev server + web preview ─────────
  mobile:
    image: node:22-alpine
    container_name: fittracker-dev-mobile
    working_dir: /app
    restart: unless-stopped
    networks:
      fittracker-dev-net:
      agathas-proxy:
        aliases:
          - fittracker-dev-web
    expose:
      - "19006"   # web preview (Cloudflare aponta pra cá)
      - "8081"    # metro bundler
    ports:
      - "19000:19000"   # Expo Go (LAN — celular conecta aqui via QR)
      - "19001:19001"   # Expo dev tools websocket
    volumes:
      - ./mobile:/app
      - fittracker_node_modules:/app/node_modules
    environment:
      EXPO_USE_FAST_RESOLVER: "1"
      REACT_NATIVE_PACKAGER_HOSTNAME: ${LAN_IP:-127.0.0.1}
      TZ: America/Sao_Paulo
    command: >
      sh -c "
        apk add --no-cache git python3 make g++ &&
        if [ ! -f node_modules/.install-done ]; then
          npm install --legacy-peer-deps && touch node_modules/.install-done;
        fi &&
        npx expo start --web --port 19006 --host lan
      "
